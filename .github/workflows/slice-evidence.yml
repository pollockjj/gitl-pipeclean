name: Slice Evidence Collection

on:
  push:
    branches:
      - 'issue*/slice*'

jobs:
  collect-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify workflow integrity
        run: |
          BRANCH_WF=$(git hash-object .github/workflows/slice-evidence.yml)
          MAIN_WF=$(git show origin/main:.github/workflows/slice-evidence.yml | git hash-object --stdin)
          if [ "$BRANCH_WF" != "$MAIN_WF" ]; then
            echo "FATAL: Workflow file on branch does not match main."
            exit 1
          fi
          echo "Workflow integrity verified: $BRANCH_WF"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone judge
        env:
          DEPLOY_KEY: ${{ secrets.GITLBENCH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/gitlbench
          chmod 600 ~/.ssh/gitlbench
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitlbench -o StrictHostKeyChecking=no" \
            git clone git@github.com:pollockjj/gitlbench.git /tmp/gitlbench
          rm -f ~/.ssh/gitlbench

      - name: Run judge
        env:
          PROBLEM_ID: ${{ vars.PROBLEM_ID }}
          ACMOJ_TOKEN: ${{ secrets.ACMOJ_TOKEN }}
          ACMOJ_PROBLEM_ID: ${{ vars.ACMOJ_PROBLEM_ID }}
          GITL_TDD_APP_ID: ${{ secrets.GITL_TDD_APP_ID }}
          GITL_TDD_INSTALL_ID: ${{ secrets.GITL_TDD_INSTALL_ID }}
          GITL_TDD_PEM: ${{ secrets.GITL_TDD_PEM }}
        run: |
          bash /tmp/gitlbench/scripts/ci_judge.sh

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/gitlbench /tmp/gitl-tdd.pem ~/.ssh/gitlbench
